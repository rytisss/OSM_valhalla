name: Publish Docker image

# MANUAL ONLY — deliberately NOT triggered by push/tags.
#
# The image builds the routing graph at image-build time (see Dockerfile), so a
# full-USA build needs ~100 GB disk + lots of RAM + hours and will NOT fit on a
# GitHub-hosted runner. Publishing USA is done by building on a capable machine
# (e.g. a dev box) and `docker push`-ing the result — CI auto-building on every
# push would just fail. Use this dispatch only for a small regional `pbf_url`,
# or point it at a self-hosted/large runner.
on:
  workflow_dispatch:
    inputs:
      pbf_url:
        description: "OSM extract to bake into the image (Geofabrik .osm.pbf URL)"
        required: false
        default: "https://download.geofabrik.de/north-america/us-latest.osm.pbf"

env:
  REGISTRY: ghcr.io
  # Resolves to the current repo owner, so the package follows any future
  # ownership transfer automatically (metadata-action lowercases it).
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 only: the graph is built during the image build, and a tile
          # build under arm64 emulation is impractically slow. arm64 hosts run
          # this image via emulation (fine for serving tiles).
          platforms: linux/amd64
          build-args: |
            PBF_URL=${{ github.event.inputs.pbf_url || 'https://download.geofabrik.de/north-america/us-latest.osm.pbf' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
